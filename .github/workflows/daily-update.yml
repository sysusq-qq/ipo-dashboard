name: Daily IPO Update

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 09:00 HKT (UTC+8 = UTC 01:00)
  workflow_dispatch:        # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许推送 data.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch & analyze
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python scripts/fetch_and_analyze.py

      - name: Commit and push if changed
        run: |
          git config user.name "IPO Bot"
          git config user.email "ipo-bot@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No new stocks found, nothing to commit."
          else
            git commit -m "Auto-update: IPO listings $(date +%Y-%m-%d)"
            git push
          fi
