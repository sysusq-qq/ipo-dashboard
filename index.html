<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>港股打新分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:     #0d1117;
      --bg-surface:  #161b22;
      --bg-card:     #1c2130;
      --bg-hover:    #222839;
      --border:      #2d3449;
      --border-light:#3a4257;
      --text-primary:#e6edf3;
      --text-second: #8b949e;
      --text-dim:    #505a6a;
      --green:       #00c47a;
      --green-bg:    #0d2e1e;
      --red:         #f85149;
      --red-bg:      #2d1214;
      --yellow:      #f0a030;
      --yellow-bg:   #2d2210;
      --blue:        #3d9fef;
      --blue-bg:     #0d1f35;
      --gold:        #f6c343;
      --cyan:        #4fc3f7;
      --cyan-bg:     #0a1f2d;
      --accent:      #3d9fef;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Nav ─────────────────────────────────────────── */
    .topbar {
      height: 52px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-logo { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: .5px; }
    .topbar-sub  { font-size: 13px; color: var(--text-dim); border-left: 1px solid var(--border); padding-left: 12px; }
    .topbar-date { margin-left: auto; font-size: 12px; color: var(--text-dim); }

    /* ── Main Layout ─────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 288px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 11px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-count {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 10px;
      padding: 1px 7px;
      color: var(--text-second);
    }
    .sidebar-list { overflow-y: auto; flex: 1; }

    .stock-card {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .stock-card:hover { background: var(--bg-hover); }
    .stock-card.active {
      background: var(--blue-bg);
      border-left: 3px solid var(--blue);
      padding-left: 13px;
    }
    .stock-card.active .stock-code { color: var(--blue); }

    .stock-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 6px;
    }
    .stock-code {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: 'SF Mono', 'Fira Code', monospace;
      flex-shrink: 0;
    }
    .badge-row { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

    .verdict-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: .5px;
    }
    .badge-da   { background: var(--green-bg); color: var(--green);  border: 1px solid var(--green); }
    .badge-no   { background: var(--red-bg);   color: var(--red);    border: 1px solid var(--red); }
    .badge-wait { background: var(--yellow-bg);color: var(--yellow); border: 1px solid var(--yellow); }

    .status-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: .3px;
    }
    .s-hot      { background: #0e1e38; color: var(--accent);  border: 1px solid var(--accent); }
    .s-hotday   { background: #1a1000; color: var(--gold);    border: 1px solid var(--gold); }
    .s-closed   { background: #1a100a; color: #e07030;        border: 1px solid #e07030; }
    .s-listed   { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); }
    .s-transfer { background: var(--cyan-bg); color: var(--cyan);   border: 1px solid var(--cyan); }

    .stock-name {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stock-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-second); }
    .stock-price { font-weight: 600; color: var(--gold); }

    .score-bar { margin-top: 7px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--green)); }
    .score-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; text-align: right; }

    /* ── Sidebar Tabs（纵向）─────────────────────────────── */
    .sidebar-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar-tabs {
      width: 52px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .sidebar-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      transition: color .15s, background .15s;
      user-select: none;
      box-shadow: inset -2px 0 0 transparent;
      padding: 6px 2px;
    }
    .sidebar-tab:last-child { border-bottom: none; }
    .sidebar-tab:hover { color: var(--text-second); background: var(--bg-hover); }
    .sidebar-tab.active {
      color: var(--blue);
      background: var(--blue-bg);
      box-shadow: inset -2px 0 0 var(--blue);
    }
    .tab-label { letter-spacing: .5px; line-height: 1.2; }
    .tab-count {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      line-height: 1;
    }
    .sidebar-tab.active .tab-count { color: var(--blue); }

    /* ── Content ─────────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* Report Header */
    .report-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .report-header-left { flex: 1; min-width: 0; }
    .report-company { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
    .report-subtitle { font-size: 13px; color: var(--text-second); margin-bottom: 10px; }
    .header-tags { display: flex; gap: 7px; flex-wrap: wrap; }
    .tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-second);
    }
    .verdict-box {
      flex-shrink: 0;
      text-align: center;
      padding: 14px 22px;
      border-radius: 10px;
      min-width: 115px;
    }
    .verdict-box.da   { background: var(--green-bg); border: 1px solid var(--green); }
    .verdict-box.no   { background: var(--red-bg);   border: 1px solid var(--red); }
    .verdict-box.wait { background: var(--yellow-bg);border: 1px solid var(--yellow); }
    .verdict-main { font-size: 28px; font-weight: 800; letter-spacing: 2px; }
    .verdict-box.da   .verdict-main { color: var(--green); }
    .verdict-box.no   .verdict-main { color: var(--red); }
    .verdict-box.wait .verdict-main { color: var(--yellow); }
    .verdict-score { font-size: 12px; color: var(--text-second); margin-top: 4px; }
    .verdict-pos   { font-size: 12px; margin-top: 2px; color: var(--text-second); }

    /* Conclusion */
    .conclusion-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 22px;
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text-primary);
    }
    .conclusion-box strong { color: var(--gold); }

    /* Sections */
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 9px; }
    .info-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; }
    .info-item-label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
    .info-item-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .info-item-value.highlight { color: var(--gold); }
    .info-item-value.green     { color: var(--green); }
    .info-item-value.blue      { color: var(--blue); }
    .info-item-value.red       { color: var(--red); }
    .info-item-value.sm        { font-size: 12px; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    .data-table tbody tr:hover { background: var(--bg-hover); }
    .data-table tbody td { padding: 9px 12px; color: var(--text-primary); }
    .data-table tbody td:first-child { color: var(--text-second); }

    /* Score table */
    .score-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .score-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .score-table tr:hover td { background: var(--bg-hover); }
    .score-table .total td { font-weight: 800; border-top: 1px solid var(--border-light); color: var(--gold); }
    .score-progress { display: flex; align-items: center; gap: 8px; }
    .sp-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .sp-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 3px; }

    /* Cash flow check */
    .cf-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 17px;
    }
    .cf-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .cf-row:last-child { border-bottom: none; }
    .cf-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
    .cf-text { color: var(--text-primary); line-height: 1.5; font-size: 13px; }
    .cf-tag { margin-left: auto; flex-shrink: 0; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .cf-ok   { background: var(--green-bg); color: var(--green);  border: 1px solid var(--green); }
    .cf-warn { background: var(--yellow-bg);color: var(--yellow); border: 1px solid var(--yellow); }
    .cf-bad  { background: var(--red-bg);   color: var(--red);    border: 1px solid var(--red); }

    /* Cornerstone */
    .cornerstone-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .cs-pill {
      font-size: 12px;
      padding: 4px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-second);
    }
    .cs-pill.tier1 { border-color: var(--gold); color: var(--gold); background: #1e1a0d; }

    /* Risk */
    .risk-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .risk-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--yellow);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
    }
    .risk-item strong { color: var(--yellow); }

    /* Action */
    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .action-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 13px; }
    .action-date { font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 5px; letter-spacing: .5px; }
    .action-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .action-desc { font-size: 12px; color: var(--text-second); line-height: 1.5; }

    /* Notice banner */
    .notice-banner {
      background: var(--cyan-bg);
      border: 1px solid var(--cyan);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--cyan);
      line-height: 1.6;
    }

    /* ── IPO Timeline ─────────────────────────────────── */
    .ipo-timeline {
      display: flex;
      align-items: flex-start;
      padding: 16px 20px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .tl-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
      flex-shrink: 0;
    }
    .tl-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      border: 2px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-dim);
      position: relative;
      z-index: 1;
    }
    .tl-dot.tl-past   { background: var(--border); border-color: var(--border); color: var(--bg-base); }
    .tl-dot.tl-today  { background: var(--green);  border-color: var(--green);  color: var(--bg-base); box-shadow: 0 0 0 4px rgba(0,196,122,.18); }
    .tl-dot.tl-future { background: var(--bg-surface); border-color: var(--border-light); color: var(--text-dim); }
    .tl-label {
      margin-top: 7px;
      font-size: 11px; font-weight: 600;
      color: var(--text-second);
      text-align: center;
    }
    .tl-label.tl-past   { color: var(--text-dim); }
    .tl-label.tl-today  { color: var(--green); }
    .tl-label.tl-future { color: var(--text-second); }
    .tl-date {
      margin-top: 3px;
      font-size: 12px; font-weight: 600;
      color: var(--text-primary);
      text-align: center;
    }
    .tl-date.tl-past { color: var(--text-dim); }
    .tl-time {
      margin-top: 1px;
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
    }
    .tl-connector {
      flex: 1;
      height: 2px;
      margin-top: 13px;
      min-width: 24px;
      background: var(--border);
    }
    .tl-connector.tl-past   { background: var(--border-light); }
    .tl-connector.tl-future { background: var(--border); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* Placeholder */
    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px; color: var(--text-dim);
    }
    .placeholder-icon { font-size: 48px; opacity: .3; }
    .placeholder-text { font-size: 14px; }

    /* ── 中签率预测 / 申购建议 ──────────────────────────── */
    .sub-scenario { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .sub-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 13px; text-align: center; }
    .sub-card-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
    .sub-card-mult  { font-size: 22px; font-weight: 800; color: var(--blue); font-family: 'SF Mono','Fira Code',monospace; }
    .sub-card-clawback { font-size: 11px; color: var(--text-second); margin: 4px 0; }
    .sub-card-rate  { font-size: 15px; font-weight: 700; color: var(--green); }
    .sub-card-profit { font-size: 12px; color: var(--gold); margin-top: 5px; font-weight: 600; }
    .order-rec { background: var(--green-bg); border: 1px solid var(--green); border-radius: 8px; padding: 14px 18px; }
    .order-rec.wait-rec { background: var(--yellow-bg); border-color: var(--yellow); }
    .order-rec.no-rec   { background: var(--red-bg);    border-color: var(--red); }
    .order-rec-title { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 11px; }
    .order-rec.wait-rec .order-rec-title { color: var(--yellow); }
    .order-rec.no-rec   .order-rec-title { color: var(--red); }
    .order-rec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 11px; }
    .order-item { background: rgba(0,0,0,.25); border-radius: 6px; padding: 9px 11px; }
    .order-item-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
    .order-item-value { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .order-rationale { font-size: 12.5px; color: var(--text-second); line-height: 1.65; border-top: 1px solid rgba(255,255,255,.07); padding-top: 9px; }
    .order-trigger { font-size: 12px; padding: 6px 11px; border-radius: 5px; margin-top: 7px; }
    .order-trigger.margin-tip { color: var(--cyan);   background: var(--cyan-bg);   border: 1px solid var(--cyan); }
    .order-trigger.urgent-tip { color: var(--yellow); background: var(--yellow-bg); border: 1px solid var(--yellow); }
    /* ── Grey Market Result ── */
    .gm-result { margin-top: 12px; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; background: var(--bg-card); }
    .gm-result-header { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; font-weight: 600; letter-spacing: .3px; }
    .gm-result-body { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .gm-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .gm-value { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">📊 港股打新分析</span>
  <span class="topbar-sub">IPO Research · HK Main Board · 2026 Q2</span>
  <span class="topbar-date" id="topbar-date"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      近期新股
      <span class="sidebar-count" id="stock-count"></span>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="recruiting" onclick="switchTab('recruiting')">
          <span class="tab-label">招股中</span><span class="tab-count" id="tc-recruiting"></span>
        </div>
        <div class="sidebar-tab" data-tab="closed" onclick="switchTab('closed')">
          <span class="tab-label">已截招</span><span class="tab-count" id="tc-closed"></span>
        </div>
        <div class="sidebar-tab" data-tab="listed" onclick="switchTab('listed')">
          <span class="tab-label">已上市</span><span class="tab-count" id="tc-listed"></span>
        </div>
        <div class="sidebar-tab" data-tab="other" onclick="switchTab('other')">
          <span class="tab-label">其他</span><span class="tab-count" id="tc-other"></span>
        </div>
      </div>
      <div class="sidebar-list" id="stock-list"></div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="placeholder">
      <div class="placeholder-icon">📋</div>
      <div class="placeholder-text">← 点击左侧股票查看分析报告</div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   DATA  —  按上市日期倒序排列（越晚越前）
════════════════════════════════════════════════════════ */
const stocks = [

  /* ── 0. 01879 曦智科技-P (18C) ───────────────────── */
  {
    code: '01879',
    applyEndTs: 1776909600,   // 北京时间 2026-04-23 10:00
    listTs:     1777305600,   // 北京时间 2026-04-28 00:00
    name: '曦智科技',
    nameEn: 'Lightelligence',
    sector: '光子计算 / 光电混合算力 / AI互联 (18C)',
    listDate: '2026-04-28',
    subDate: '2026-04-17 ~ 2026-04-23',
    price: 183.20,
    lotSize: 15,
    entryFee: 2775.71,
    totalIssue: '约9180万股（全球发售，估）',

/* ════════════════════════════════════════════════════════
   北京时间工具
════════════════════════════════════════════════════════ */
function bjNowMs() {
  return Date.now() + new Date().getTimezoneOffset() * 60000 + 8 * 3600000;
}

function calcStatus(s) {
  if (s.isTransfer) return { cls: 's-transfer', text: '转板' };
  const nowTs = bjNowMs() / 1000;
  if (s.listTs     && nowTs >= s.listTs)     return { cls: 's-listed',  text: '已上市' };
  if (s.applyEndTs && nowTs >= s.applyEndTs) return { cls: 's-closed',  text: '已截招' };
  if (s.applyEndTs) {
    // 判断今天是否是截止当天（北京日期对比）
    const pad = n => String(n).padStart(2,'0');
    const bj  = new Date(bjNowMs());
    const end = new Date(s.applyEndTs * 1000 + new Date().getTimezoneOffset() * 60000 + 8 * 3600000);
    const sameDay = bj.getUTCFullYear() === end.getUTCFullYear() &&
                    bj.getUTCMonth()    === end.getUTCMonth()    &&
                    bj.getUTCDate()     === end.getUTCDate();
    if (sameDay) return { cls: 's-hotday', text: '今日截招' };
    return { cls: 's-hot', text: '招股中' };
  }
  return { cls: 's-listed', text: '已上市' };
}

/* ════════════════════════════════════════════════════════
   中签率计算（港交所回拨机制）
   公式：min(1, clawbackPct / (initPct × subMult)) × 100
════════════════════════════════════════════════════════ */
function calcAllocRate(subMult) {
  let clawPct;
  if      (subMult < 15)  clawPct = 0.10;
  else if (subMult < 50)  clawPct = 0.30;
  else if (subMult < 100) clawPct = 0.40;
  else                    clawPct = 0.50;
  const rate = Math.min(1, clawPct / (0.10 * subMult)) * 100;
  return { allocRate: rate.toFixed(1), clawPct: (clawPct * 100).toFixed(0) };
}

/* ════════════════════════════════════════════════════════
   RENDER SIDEBAR
════════════════════════════════════════════════════════ */
let activeTab = 'recruiting';
let selectedIdx = 0;

const TAB_CLS = {
  recruiting: ['s-hot', 's-hotday'],
  closed:     ['s-closed'],
  listed:     ['s-listed'],
  other:      ['s-transfer'],
};

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tab)
  );
  renderSidebar();
  // 自动选中新 tab 的第一只股票
  const first = document.querySelector('.stock-card');
  if (first) selectStock(parseInt(first.dataset.idx));
}

function renderSidebar() {
  const clsList = TAB_CLS[activeTab] || [];
  // 保留原始 index，方便 selectStock
  const filtered = stocks.map((s, i) => ({ s, i }))
                         .filter(({ s }) => clsList.includes(calcStatus(s).cls));

  // 更新各 tab 计数
  Object.entries(TAB_CLS).forEach(([tab, cls]) => {
    const n = stocks.filter(s => cls.includes(calcStatus(s).cls)).length;
    const el = document.getElementById('tc-' + tab);
    if (el) el.textContent = n > 0 ? n : '';
  });

  // 更新 header 计数
  document.getElementById('stock-count').textContent = filtered.length + '只';

  const list = document.getElementById('stock-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:28px 16px;text-align:center;color:var(--text-dim);font-size:13px;">暂无</div>';
    return;
  }

  list.innerHTML = filtered.map(({ s, i }) => {
    const priceStr = s.price ? `HK$${s.price.toFixed(2)}` : '转板';
    const st = calcStatus(s);
    return `
    <div class="stock-card${i === selectedIdx ? ' active' : ''}" data-idx="${i}" onclick="selectStock(${i})">
      <div class="stock-row1">
        <span class="stock-code">${s.code}</span>
        <span class="badge-row">
          <span class="status-badge ${st.cls}">${st.text}</span>
          <span class="verdict-badge badge-${s.verdict}">${s.verdictLabel}</span>
        </span>
      </div>
      <div class="stock-name">${s.name}</div>
      <div class="stock-meta">
        <span class="stock-price">${priceStr}</span>
        <span>上市 ${s.listDate}</span>
      </div>
      <div class="score-bar"><div class="score-fill" style="width:${s.score}%"></div></div>
      <div class="score-label">${s.score}/100 · ${s.sector}</div>
    </div>`;
  }).join('');
}

        return {
          dateStr: `${pad2(d.getUTCMonth()+1)}/${pad2(d.getUTCDate())}`,
          timeStr: `${pad2(d.getUTCHours())}:${pad2(d.getUTCMinutes())}`,
          ts
        };
      }
      // 上市日 listTs 是当天 00:00 BJ，暗盘/中签取上市日的前一天/两天
      const listTs_val   = s.listTs;
      const darkTs_val   = listTs_val  ? listTs_val  - 86400 : null;
      const resultTs_val = darkTs_val  ? darkTs_val  - 86400 : null;

      const nodes = [
        { key: 'apply',  label: '申购截止', icon: '✂️', info: tsInfo(s.applyEndTs),   extraTime: null },
        { key: 'result', label: '中签结果', icon: '📋', info: tsInfo(resultTs_val),  extraTime: '上午公布' },
        { key: 'dark',   label: '暗盘',     icon: '🌙', info: tsInfo(darkTs_val),    extraTime: '16:15–18:30' },
        { key: 'list',   label: '上市',     icon: '🔔', info: tsInfo(listTs_val),    extraTime: '09:30' },
      ].filter(n => n.info);

      if (!nodes.length) return '';

      // 判断每个节点状态：past / today / future
      function nodeState(info) {
        if (!info) return 'future';
        const bjNow  = new Date(Date.now() + 8 * 3600000);
        const bjNode = new Date(info.ts * 1000 + 8 * 3600000);
        // 同一北京日期算 today（必须先判断，避免 listTs=00:00 BJ 当天被误判为 past）
        if (bjNow.getUTCFullYear() === bjNode.getUTCFullYear() &&
            bjNow.getUTCMonth()    === bjNode.getUTCMonth()    &&
            bjNow.getUTCDate()     === bjNode.getUTCDate())     return 'today';
        if (nowTs >= info.ts) return 'past';
        return 'future';
      }

      const nodeHTML = nodes.map((n, i) => {
        const st  = nodeState(n.info);
        const dot = st === 'past' ? '✓' : st === 'today' ? n.icon : n.icon;
        const connector = i < nodes.length - 1
          ? `<div class="tl-connector ${st === 'past' ? 'tl-past' : 'tl-future'}"></div>`
          : '';
        return `
        <div class="tl-node">
          <div class="tl-dot ${st === 'past' ? 'tl-past' : st === 'today' ? 'tl-today' : 'tl-future'}">${dot}</div>
          <div class="tl-label ${st === 'past' ? 'tl-past' : st === 'today' ? 'tl-today' : ''}">${n.label}</div>
          <div class="tl-date ${st === 'past' ? 'tl-past' : ''}">${n.info.dateStr}</div>
          <div class="tl-time">${n.extraTime || n.info.timeStr}</div>
        </div>${connector}`;
      }).join('');

      return `<div class="ipo-timeline">${nodeHTML}</div>`;
    })()}

    <!-- Conclusion -->
    <div class="section">
      <div class="section-title">投资结论</div>
      <div class="conclusion-box">${s.conclusion}</div>
    </div>

    <!-- Basic Info -->
    <div class="section">
      <div class="section-title">基础信息</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-item-label">招股价</div>
          <div class="info-item-value highlight">${priceDisplay}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">入场费（1手）</div>
          <div class="info-item-value highlight">${entryDisplay}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">市盈率（静）</div>
          <div class="info-item-value">${s.pe}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">H股市值</div>
          <div class="info-item-value blue">${s.mktCapH}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">发行总量</div>
          <div class="info-item-value sm">${s.totalIssue}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">公开发售</div>
          <div class="info-item-value sm">${s.publicIssue}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">绿鞋</div>
          <div class="info-item-value green">${s.greenshoe}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">保荐人</div>
          <div class="info-item-value sm">${s.sponsors}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">招股日期</div>
          <div class="info-item-value sm">${s.subDate}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">基石总额</div>
          <div class="info-item-value green sm">${s.cornerstone.total}</div>
        </div>
      </div>
    </div>

    <!-- Score -->
    <div class="section">
      <div class="section-title">基本面评分</div>
      <table class="score-table">
        ${s.scores.map(r => `
        <tr>
          <td style="width:110px;color:var(--text-second)">${r.label}</td>
          <td>
            <div class="score-progress">
              <div class="sp-bar"><div class="sp-fill" style="width:${r.pts/r.max*100}%"></div></div>
            </div>
          </td>
          <td style="width:55px;font-weight:700;font-family:monospace;font-size:14px">${r.pts}/${r.max}</td>
          <td style="font-size:12px;color:var(--text-dim)">${r.desc}</td>
        </tr>`).join('')}
        <tr class="total">
          <td>总分</td>
          <td><div class="score-progress"><div class="sp-bar"><div class="sp-fill" style="width:${s.score}%"></div></div></div></td>
          <td style="font-weight:800;font-family:monospace;font-size:14px">${s.score}/100</td>
          <td style="font-size:12px;color:var(--text-second)">≥70分参与门槛</td>
        </tr>
      </table>
    </div>

    <!-- Financial Data -->
    <div class="section">
      <div class="section-title">关键财务数据</div>
      <table class="data-table">
        <thead>
          <tr>
            <th>指标</th>
            <th>2023年</th>
            <th>2024年</th>
            <th>2025年</th>
          </tr>
        </thead>
        <tbody>
          ${s.financial.map(r => `
          <tr>
            <td>${r.label}</td>
            <td>${r.y2023}</td>
            <td>${r.y2024}</td>
            <td style="font-weight:600">${r.y2025}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- Cash Flow Check -->
    <div class="section">
      <div class="section-title">现金流三角验证</div>
      <div class="cf-box">
        ${s.cfChecks.map(c => `
        <div class="cf-row">
          <span class="cf-icon">${c.icon}</span>
          <span class="cf-text">${c.text}</span>
          <span class="cf-tag cf-${c.tag}">${c.tagText}</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- Cornerstone -->
    <div class="section">
      <div class="section-title">基石投资者</div>
      <div class="cornerstone-list">
        ${tier1Badges || otherBadges
          ? tier1Badges + otherBadges
          : `<span style="font-size:13px;color:var(--text-dim)">无基石投资者安排</span>`}
      </div>
    </div>

    <!-- Risks -->
    <div class="section">
      <div class="section-title">主要风险</div>
      <ul class="risk-list">
        ${s.risks.map(r => `<li class="risk-item">${r}</li>`).join('')}
      </ul>
    </div>

    <!-- Action Plan -->
    <div class="section">
      <div class="section-title">操作节点</div>
      <div class="action-grid">
        ${s.actions.map(a => `
        <div class="action-card">
          <div class="action-date">${a.date}</div>
          <div class="action-title">${a.title}</div>
          <div class="action-desc">${a.desc}</div>
        </div>`).join('')}
      </div>
    </div>

    ${(() => {
      if (!s.subscription) return '';
      const sub = s.subscription;
      const st = calcStatus(s);

      const padM = n => String(n).padStart(2,'0');
      // listTs 是北京时间 Unix 秒，+8h 后用 getUTC* 读取即为北京日期
      const bjDate = d => `${padM(d.getUTCMonth()+1)}/${padM(d.getUTCDate())}`;
      const listD = s.listTs ? new Date(s.listTs * 1000 + 8 * 3600000) : null;
      const darkD = listD ? new Date(listD.getTime() - 86400000) : null;

      // ── 情景卡片（任何状态都显示，供参考）──
      const scenarioHTML = sub.scenarios.map(sc => {
        const { allocRate, clawPct } = calcAllocRate(sc.mult);
        const profit = s.price
          ? `+HK$${Math.round(s.price * s.lotSize * sc.premPct / 100).toLocaleString()}/手`
          : 'N/A';
        return `<div class="sub-card">
          <div class="sub-card-label">${sc.label}情景</div>
          <div class="sub-card-mult">${sc.mult}x</div>
          <div class="sub-card-clawback">回拨至${clawPct}% 公开发售</div>
          <div class="sub-card-rate">中签率 ~${allocRate}%</div>
          <div class="sub-card-profit">溢价${sc.premPct}% → ${profit}</div>
        </div>`;
      }).join('');

      // ── 根据状态决定底部建议卡内容 ──
      let recCardHTML = '';

      if (st.cls === 's-listed') {
        // 已上市：显示历史参考卡
        const listStr = listD ? bjDate(listD) : '—';
        recCardHTML = `
      <div class="order-rec" style="border-color:var(--border-light)">
        <div class="order-rec-title" style="color:var(--text-second)">📌 已上市（历史参考）</div>
        <div class="order-rec-grid">
          <div class="order-item">
            <div class="order-item-label">上市日期</div>
            <div class="order-item-value">${listStr}</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">当初建议</div>
            <div class="order-item-value">${sub.recTitle}</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">建议手数</div>
            <div class="order-item-value" style="color:var(--text-dim)">${sub.lots}手</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">每手入场费</div>
            <div class="order-item-value" style="color:var(--text-dim)">
              ${s.entryFee ? 'HK$' + s.entryFee.toLocaleString() : '—'}
            </div>
          </div>
        </div>
        <div class="order-rationale" style="color:var(--text-second)">${sub.rationale}</div>
      </div>`;

      } else if (st.cls === 's-closed') {
        // 申购已截止：保留原申购建议 + 追加后续时间节点
        const recClassMap = { da: '', wait: 'wait-rec', no: 'no-rec' };
        const listStr   = listD ? bjDate(listD) : '—';
        const darkStr   = darkD ? bjDate(darkD) : '—';
        const resultD   = darkD ? new Date(darkD.getTime() - 86400000) : null;
        const resultStr = resultD ? bjDate(resultD) : '—';
        recCardHTML = `
      <div class="order-rec ${recClassMap[sub.recClass] || ''}">
        <div class="order-rec-title">${sub.recTitle} <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:6px">（申购已截止）</span></div>
        <div class="order-rec-grid">
          <div class="order-item">
            <div class="order-item-label">建议手数</div>
            <div class="order-item-value">${sub.lots}手</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">申购方式</div>
            <div class="order-item-value">${sub.method}</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">孖展</div>
            <div class="order-item-value" style="color:${sub.marginOk ? 'var(--cyan)' : 'var(--text-dim)'}">
              ${sub.marginOk ? '条件允许' : '不建议'}
            </div>
          </div>
          <div class="order-item">
            <div class="order-item-label">每手入场费</div>
            <div class="order-item-value" style="color:var(--gold)">
              ${s.entryFee ? 'HK$' + s.entryFee.toLocaleString() : '—'}
            </div>
          </div>
        </div>
        ${sub.marginOk && sub.marginTip ? `<div class="order-trigger margin-tip">📌 ${sub.marginTip}</div>` : ''}
        <div class="order-rationale">${sub.rationale}</div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div class="order-item">
            <div class="order-item-label">📋 中签结果</div>
            <div class="order-item-value" style="color:var(--yellow)">${resultStr} 公布</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">🌙 暗盘</div>
            <div class="order-item-value">${darkStr} 16:15–18:30</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">🔔 上市</div>
            <div class="order-item-value">${listStr} 09:30</div>
          </div>
        </div>
      </div>`;

      } else {
        // 招股中 / 今日截招：显示完整申购建议
        const recClassMap = { da: '', wait: 'wait-rec', no: 'no-rec' };
        recCardHTML = `
      <div class="order-rec ${recClassMap[sub.recClass] || ''}">
        <div class="order-rec-title">${sub.recTitle}</div>
        <div class="order-rec-grid">
          <div class="order-item">
            <div class="order-item-label">建议手数</div>
            <div class="order-item-value">${sub.lots}手</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">申购方式</div>
            <div class="order-item-value">${sub.method}</div>
          </div>
          <div class="order-item">
            <div class="order-item-label">孖展</div>
            <div class="order-item-value" style="color:${sub.marginOk ? 'var(--cyan)' : 'var(--text-dim)'}">
              ${sub.marginOk ? '条件允许' : '不建议'}
            </div>
          </div>
          <div class="order-item">
            <div class="order-item-label">每手入场费</div>
            <div class="order-item-value" style="color:var(--gold)">
              ${s.entryFee ? 'HK$' + s.entryFee.toLocaleString() : '—'}
            </div>
          </div>
        </div>
        ${sub.marginOk && sub.marginTip ? `<div class="order-trigger margin-tip">📌 ${sub.marginTip}</div>` : ''}
        <div class="order-rationale">${sub.rationale}</div>
        ${sub.urgentTip ? `<div class="order-trigger urgent-tip">${sub.urgentTip}</div>` : ''}
      </div>`;
      }

      const sectionTitle = (st.cls === 's-closed' || st.cls === 's-listed')
        ? '中签率预测 · 等待结果'
        : '中签率预测 · 申购建议';

      return `
    <div class="section">
      <div class="section-title">${sectionTitle}</div>
      <div class="sub-scenario">${scenarioHTML}</div>
      ${recCardHTML}
    </div>`;
    })()}

    ${(() => {
      const gm = s.greyMarket;
      if (!gm || !gm.date) return '';
      const bjNow     = new Date(bjNowMs());
      const parts     = gm.date.split('-').map(Number);
      const gmDateMs  = Date.UTC(parts[0], parts[1] - 1, parts[2]);
      const bjTodayMs = Date.UTC(bjNow.getUTCFullYear(), bjNow.getUTCMonth(), bjNow.getUTCDate());
      const isPast    = bjTodayMs > gmDateMs;
      const isToday   = bjTodayMs === gmDateMs;
      // 当日精确时间（北京时间，用 getUTC* 读取已偏移8h的时间戳）
      const bjHHMM    = bjNow.getUTCHours() * 100 + bjNow.getUTCMinutes();
      const GM_OPEN   = 1615;   // 16:15 HKT
      const GM_CLOSE  = 1830;   // 18:30 HKT

      let priceStr, changeStr, changeColor;
      if (gm.price !== null && gm.price !== undefined && gm.price > 0) {
        priceStr    = `HK$${gm.price}`;
        const sign  = gm.changePct >= 0 ? '+' : '';
        changeStr   = `${sign}${gm.changePct}%`;
        changeColor = gm.changePct >= 0 ? 'var(--green)' : 'var(--red)';
      } else if (isToday && bjHHMM >= GM_OPEN && bjHHMM < GM_CLOSE) {
        priceStr    = '进行中';
        changeStr   = '实时更新';
        changeColor = 'var(--yellow)';
      } else if (isToday && bjHHMM < GM_OPEN) {
        priceStr    = '待开盘';
        changeStr   = '16:15 开市';
        changeColor = 'var(--text-dim)';
      } else if (!isPast) {
        priceStr    = '未开始';
        changeStr   = '—';
        changeColor = 'var(--text-dim)';
      } else {
        priceStr    = '暂无数据';
        changeStr   = '—';
        changeColor = 'var(--text-dim)';
      }

      return `
    <div class="section">
      <div class="section-title">暗盘记录</div>
      <div class="gm-result">
        <div class="gm-result-header">🌙 ${gm.date} &nbsp;16:15–18:30 HKT</div>
        <div class="gm-result-body">
          <div>
            <div class="gm-label">发行价</div>
            <div class="gm-value" style="color:var(--gold)">${s.price ? 'HK$' + s.price : '—'}</div>
          </div>
          <div>
            <div class="gm-label">暗盘收盘价</div>
            <div class="gm-value">${priceStr}</div>
          </div>
          <div>
            <div class="gm-label">涨幅</div>
            <div class="gm-value" style="color:${changeColor}">${changeStr}</div>
          </div>
          <div>
            <div class="gm-label">最高价 / 最高涨幅</div>
            <div class="gm-value" style="color:var(--text-dim)">${
              gm.peakPrice ? `HK$${gm.peakPrice} <span style="font-size:12px;color:var(--green)">+${gm.peakChangePct}%</span>` : '—'
            }</div>
          </div>
        </div>
      </div>
    </div>`;
    })()}
  `;
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
renderSidebar();
// 初始选中默认 tab 的第一只股票
(function() {
  const first = document.querySelector('.stock-card');
  if (first) selectStock(parseInt(first.dataset.idx));
})();

function updateClock() {
  const bj  = new Date(bjNowMs());
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('topbar-date').textContent =
    `北京时间  ${bj.getUTCFullYear()}-${pad(bj.getUTCMonth()+1)}-${pad(bj.getUTCDate())}  ${pad(bj.getUTCHours())}:${pad(bj.getUTCMinutes())}:${pad(bj.getUTCSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

// 每分钟重新渲染侧边栏状态标签
setInterval(renderSidebar, 60000);

// selectStock(0) 已由上方 renderSidebar 后的初始化替代
</script>
</body>
</html>
